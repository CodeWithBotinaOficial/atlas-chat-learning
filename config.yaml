model:
  embed_dim: 256
  num_heads: 8
  ff_dim: 1024
  num_layers: 6
  max_seq_len: 512
  dropout_rate: 0.1

training:
  learning_rate: 0.0003
  lr_decay_rate: 0.95
  lr_decay_steps: 100
  replay_buffer_size: 200
  replay_sample_rate: 0.3

generation:
  temperature: 0.3
  repetition_penalty: 1.2
  top_k: 40
  top_p: 0.95
  beam_width: 5
  max_new_tokens: 300

memory:
  max_history_length: 15